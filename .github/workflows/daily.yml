name: daily-arxiv-digest

on:
  schedule:
    # 08:00 America/Los_Angeles. GitHub cron is UTC; 15:00 UTC = 08:00 PDT (夏令时).
    # 冬令时(PST, UTC-8)时这会变成 07:00 本地——届时把 15 改成 16 即可。
    - cron: "0 15 * * *"
  workflow_dispatch: {}   # 允许手动触发测试

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Generate & email digest
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: claude-opus-4-8
          SEED_AUTHOR: ${{ secrets.SEED_AUTHOR }}   # 种子作者放 secret，不写进仓库（日志里会打码）
          SMTP_SENDER_EMAIL: ${{ secrets.SMTP_SENDER_EMAIL }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
        run: |
          python arxiv_daily.py \
            --cats cs.CL,cs.LG,cs.AI \
            --pool 250 --top 12 \
            -o digest-latest.md
      - uses: actions/upload-artifact@v4
        with:
          name: digest
          path: digest-latest.md
          if-no-files-found: warn
